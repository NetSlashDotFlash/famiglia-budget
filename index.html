<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a3d7a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Budget Famiglia" />
  <title>Budget Famiglia</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f0f0;-webkit-tap-highlight-color:transparent}
    .app{max-width:430px;margin:0 auto;background:#f0f0f0;height:100vh;display:flex;flex-direction:column}

    .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;background:#fff;border-bottom:1px solid #ddd;flex-shrink:0}
    .month-nav{display:flex;align-items:center}
    .mnbtn{background:none;border:none;font-size:22px;cursor:pointer;color:#888;padding:2px 10px;border-radius:8px}
    .mnbtn:active{background:#eee}
    .month-title{font-size:16px;font-weight:500;color:#222;min-width:130px;text-align:center}
    .add-btn{background:#2a5a10;color:#fff;border:none;font-size:26px;cursor:pointer;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;line-height:1;padding-bottom:2px}
    .add-btn:active{background:#1a3a08}
    .scroll-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

    .hero{background:#1a3d7a;padding:16px 20px 18px}
    .hero-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,.6);margin-bottom:4px}
    .hero-val{font-size:40px;font-weight:500;line-height:1;color:#fff}
    .hero-val.neg{color:#ff8a80}
    .hero-avg{font-size:12px;margin-top:5px;color:rgba(255,255,255,.65)}
    .avg-better{color:#80ffaa}.avg-worse{color:#ff8a80}.avg-same{color:#ffd080}

    .bars-panel{background:#fff;padding:14px 16px;border-bottom:1px solid #eee}
    .bar-row{margin-bottom:14px}.bar-row:last-child{margin-bottom:0}
    .bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
    .bar-lbl{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.3px}
    .bar-val{font-size:14px;font-weight:500}
    .bar-avg{font-size:10px;margin-top:3px}
    .avgc-better{color:#1a7a3a}.avgc-worse{color:#aa2020}.avgc-same{color:#aa7700}
    .track{height:10px;border-radius:5px;background:#e8e8e8;overflow:hidden}
    .fill{height:100%;border-radius:5px;transition:width .4s}
    .fill-inc{background:#2a7abf}
    .track-out{display:flex;height:10px;border-radius:5px;overflow:hidden;background:#e8e8e8}
    .fill-ess{background:#3a9a20;height:100%;transition:width .3s;flex-shrink:0}
    .fill-sup{background:#e07820;height:100%;transition:width .3s;flex-shrink:0}
    .bar-sub{display:flex;gap:12px;margin-top:3px}
    .bar-sub-item{font-size:10px;display:flex;align-items:center;gap:3px;color:#666}
    .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

    .list-wrap{padding:6px 16px 80px}
    .list-empty{font-size:14px;color:#aaa;text-align:center;padding:40px 0;font-style:italic}
    .date-group{margin-bottom:4px}
    .date-hdr{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.5px;padding:10px 2px 4px;border-bottom:0.5px solid #ddd;margin-bottom:4px}
    .item{display:flex;align-items:flex-start;gap:8px;padding:10px;border-radius:10px;margin-bottom:6px;cursor:pointer;border:2px solid transparent;transition:border-color .1s;user-select:none}
    .item.essential{background:#e8f5e0}.item.superfluous{background:#fff3e0}.item.income{background:#e3f0ff}
    .item.selected{border-color:#333}
    .item-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:1px}
    .essential .item-icon{background:#b8dda0}.superfluous .item-icon{background:#ffd090}.income .item-icon{background:#a0c8ff}
    .item-body{flex:1;min-width:0}
    .item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-sub{font-size:11px;margin-top:1px}
    .essential .item-name{color:#2a5a10}.superfluous .item-name{color:#7a4000}.income .item-name{color:#0a3a7a}
    .essential .item-sub{color:#5a8a30}.superfluous .item-sub{color:#b06010}.income .item-sub{color:#2060b0}
    .prog-wrap{margin-top:5px}
    .prog-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
    .prog-cur{font-size:10px;font-weight:500}
    .prog-avg-lbl{font-size:10px;color:#999}
    .essential .prog-cur{color:#2a5a10}.superfluous .prog-cur{color:#7a4000}.income .prog-cur{color:#0a3a7a}
    .prog-track{height:5px;border-radius:3px;background:rgba(0,0,0,.1);overflow:hidden}
    .prog-fill{height:100%;border-radius:3px;transition:width .4s}
    .prog-fill.green{background:#3a9a20}.prog-fill.yellow{background:#c8900a}.prog-fill.red{background:#c83030}
    .prog-fill.inc-green{background:#1a6b9a}.prog-fill.inc-yellow{background:#c8900a}.prog-fill.inc-red{background:#c83030}
    .item-amt{font-size:14px;font-weight:500;flex-shrink:0;margin-top:1px}
    .essential .item-amt{color:#2a5a10}.superfluous .item-amt{color:#7a4000}.income .item-amt{color:#0a3a7a}
    .item-del{background:none;border:none;cursor:pointer;font-size:14px;padding:4px 6px;border-radius:50%;flex-shrink:0;opacity:0;transition:opacity .1s;color:#cc3333;margin-top:1px}
    .item.selected .item-del{opacity:1}

    .insert-screen{display:none;flex-direction:column;height:100vh;background:#f0f0f0;position:absolute;inset:0;z-index:10;max-width:430px;margin:0 auto}
    .insert-screen.open{display:flex}
    .ins-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;background:#fff;border-bottom:1px solid #ddd;flex-shrink:0}
    .ins-title{font-size:15px;font-weight:500;color:#222}
    .ins-back{background:none;border:none;font-size:14px;color:#888;cursor:pointer;padding:4px 8px;border-radius:6px}
    .ins-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:40px}
    .icard{background:#fff;border-radius:12px;margin:10px 16px 0;overflow:hidden;border:1px solid #e0e0e0}
    .icard-lbl{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px 6px}
    .tap-group{display:flex;flex-wrap:wrap;padding:0 10px 10px}
    .chip{padding:9px 14px;border-radius:20px;border:1.5px solid #ddd;font-size:14px;font-weight:500;cursor:pointer;background:#f8f8f8;color:#666;margin:4px;user-select:none;transition:all .1s}
    .chip:active{transform:scale(.95)}
    .chip.sel{background:#2a5a10;color:#fff;border-color:#2a5a10}
    .cat-section{padding:0 10px 4px}
    .cat-group-lbl{font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.4px;padding:6px 4px 3px}
    .cat-items{display:flex;flex-wrap:wrap}
    .cat-chip{padding:8px 12px;border-radius:20px;border:1.5px solid #ddd;font-size:13px;font-weight:500;cursor:pointer;background:#f8f8f8;color:#555;margin:3px;user-select:none;transition:all .1s}
    .cat-chip:active{transform:scale(.95)}
    .cat-chip.sel{background:#2a5a10;color:#fff;border-color:#2a5a10}
    .name-inp-wrap{padding:6px 14px 12px}
    .name-inp{width:100%;border:1.5px solid #ddd;border-radius:20px;padding:10px 14px;font-size:15px;background:#fff;color:#222}
    .name-inp:focus{outline:none;border-color:#2a5a10}
    .amt-row{margin:10px 16px 0;display:flex;gap:8px;align-items:stretch}
    .amt-display{flex:1;background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:12px 14px}
    .amt-lbl{font-size:10px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
    .amt-val{font-size:28px;font-weight:500;color:#bbb;line-height:1}
    .amt-val.has{color:#2a5a10}
    .right-btns{display:flex;flex-direction:column;gap:8px}
    .clear-btn{background:#fce8e8;border:1.5px solid #f0b0b0;color:#aa2222;font-size:13px;font-weight:500;cursor:pointer;padding:0 14px;border-radius:10px;flex:1;min-width:72px}
    .clear-btn:active{background:#f8d0d0;transform:scale(.95)}
    .save-btn{background:#2a5a10;color:#fff;border:none;font-size:13px;font-weight:500;cursor:pointer;padding:0 14px;border-radius:10px;flex:1;min-width:72px}
    .save-btn:disabled{background:#bbb;cursor:not-allowed}
    .save-btn:not(:disabled):active{background:#1a3a08}
    .tagli-card{background:#fff;border-radius:12px;margin:8px 16px 0;border:1px solid #e0e0e0;overflow:hidden}
    .tagli-grid{display:grid;grid-template-columns:repeat(4,1fr)}
    .taglio{border:none;background:#fff;height:52px;cursor:pointer;border-right:0.5px solid #eee;border-bottom:0.5px solid #eee;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;user-select:none;transition:background .08s}
    .taglio:nth-child(4n){border-right:none}.taglio:nth-last-child(-n+4){border-bottom:none}
    .taglio:active{background:#e8f5e0}
    .t-val{font-size:14px;font-weight:500;color:#222}.t-sub{font-size:10px;color:#999}
    .taglio.cents .t-val{font-size:12px;color:#666}
    .preview{margin:10px 16px 0;padding:12px 16px;border-radius:12px;border:2px solid #2a5a10;background:#f0f7ec;display:none}
    .preview.vis{display:block}
    .prev-name{font-size:15px;font-weight:500;color:#1a4008}
    .prev-detail{font-size:12px;color:#4a8020;margin-top:3px}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div class="app">
  <div id="main-screen" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="topbar">
      <div class="month-nav">
        <button class="mnbtn" onclick="changeMonth(-1)">‹</button>
        <span class="month-title" id="month-title"></span>
        <button class="mnbtn" onclick="changeMonth(1)">›</button>
      </div>
      <button class="add-btn" onclick="showInsert()">+</button>
    </div>
    <div class="scroll-wrap">
      <div class="hero">
        <div class="hero-label">Saldo del mese</div>
        <div class="hero-val" id="hero-bal">€ 0,00</div>
        <div class="hero-avg" id="hero-avg"></div>
      </div>
      <div class="bars-panel">
        <div class="bar-row">
          <div class="bar-top">
            <span class="bar-lbl">↑ Entrate</span>
            <span class="bar-val" style="color:#1a5a8a" id="b-in">€ 0,00</span>
          </div>
          <div class="track"><div class="fill fill-inc" id="bf-inc" style="width:0%"></div></div>
          <div class="bar-avg" id="bavg-in"></div>
        </div>
        <div class="bar-row">
          <div class="bar-top">
            <span class="bar-lbl">↓ Uscite</span>
            <span class="bar-val" style="color:#8b2020" id="b-out">€ 0,00</span>
          </div>
          <div class="track-out">
            <div class="fill-ess" id="bf-ess" style="width:0%"></div>
            <div class="fill-sup" id="bf-sup" style="width:0%"></div>
          </div>
          <div class="bar-sub">
            <div class="bar-sub-item"><div class="dot" style="background:#3a9a20"></div><span id="b-ess-lbl">Essenziali</span></div>
            <div class="bar-sub-item"><div class="dot" style="background:#e07820"></div><span id="b-sup-lbl">Superflue</span></div>
          </div>
          <div class="bar-avg" id="bavg-out"></div>
        </div>
      </div>
      <div class="list-wrap" id="list-wrap"></div>
    </div>
  </div>

  <div class="insert-screen" id="insert-screen">
    <div class="ins-topbar">
      <button class="ins-back" onclick="showMain()">← Indietro</button>
      <span class="ins-title" id="ins-date-lbl"></span>
      <div style="width:80px"></div>
    </div>
    <div class="ins-scroll">
      <div class="icard">
        <div class="icard-lbl">Tipo</div>
        <div class="tap-group">
          <div class="chip" id="t-ess" onclick="setType('essential')">★ Essenziale</div>
          <div class="chip" id="t-sup" onclick="setType('superfluous')">◆ Superflua</div>
          <div class="chip" id="t-inc" onclick="setType('income')">↑ Entrata</div>
        </div>
      </div>
      <div class="icard" id="cat-card" style="display:none">
        <div class="icard-lbl">Categoria e descrizione</div>
        <div id="cat-section" class="cat-section"></div>
        <div class="name-inp-wrap">
          <input class="name-inp" id="f-name" type="text" placeholder="o scrivi nome personalizzato…" oninput="onNameInput()" />
        </div>
      </div>
      <div class="amt-row">
        <div class="amt-display"><div class="amt-lbl">Importo</div><div class="amt-val" id="amt-disp">€ 0,00</div></div>
        <div class="right-btns">
          <button class="clear-btn" onclick="clearAmt()">Azzera</button>
          <button class="save-btn" id="ins-save" onclick="doSave()" disabled>Aggiungi</button>
        </div>
      </div>
      <div class="tagli-card">
        <div class="icard-lbl" style="border-bottom:0.5px solid #eee">Aggiungi cifra</div>
        <div class="tagli-grid">
          <div class="taglio cents" onclick="addAmt(.10)"><span class="t-val">+0,10</span><span class="t-sub">cent</span></div>
          <div class="taglio cents" onclick="addAmt(.20)"><span class="t-val">+0,20</span><span class="t-sub">cent</span></div>
          <div class="taglio cents" onclick="addAmt(.50)"><span class="t-val">+0,50</span><span class="t-sub">cent</span></div>
          <div class="taglio" onclick="addAmt(1)"><span class="t-val">+1</span><span class="t-sub">euro</span></div>
          <div class="taglio" onclick="addAmt(2)"><span class="t-val">+2</span><span class="t-sub">euro</span></div>
          <div class="taglio" onclick="addAmt(5)"><span class="t-val">+5</span><span class="t-sub">euro</span></div>
          <div class="taglio" onclick="addAmt(10)"><span class="t-val">+10</span><span class="t-sub">euro</span></div>
          <div class="taglio" onclick="addAmt(20)"><span class="t-val">+20</span><span class="t-sub">euro</span></div>
          <div class="taglio" onclick="addAmt(50)"><span class="t-val">+50</span><span class="t-sub">euro</span></div>
          <div class="taglio" onclick="addAmt(100)"><span class="t-val">+100</span><span class="t-sub">euro</span></div>
          <div class="taglio" onclick="addAmt(200)"><span class="t-val">+200</span><span class="t-sub">euro</span></div>
          <div class="taglio" onclick="addAmt(500)"><span class="t-val">+500</span><span class="t-sub">euro</span></div>
        </div>
      </div>
      <div class="preview" id="preview">
        <div class="prev-name" id="prev-name"></div>
        <div class="prev-detail" id="prev-detail"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'famiglia_budget_v2';
const MONTHS  = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DAYS_IT = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];

const CATS = {
  essential:[
    {group:'🏠 Casa',       items:['Affitto','Mutuo','Bolletta luce','Bolletta gas','Internet','Telefono fisso','Condominio','Acqua','Altro casa']},
    {group:'🚗 Auto',       items:['Carburante','Assicurazione auto','Rata auto','Parcheggio','Bollo','Manutenzione auto','Altro auto']},
    {group:'🛒 Alimentari', items:['Supermercato','Mercato','Panetteria','Altro alimentari']},
    {group:'❤️ Salute',    items:['Farmacia','Medico','Dentista','Ospedale','Palestra','Altro salute']},
    {group:'👨‍👩‍👧 Famiglia', items:['Scuola','Università','Asilo','Babysitter','Animali domestici','Abbigliamento bambini','Altro famiglia']},
    {group:'📦 Altro',      items:['Altro']},
  ],
  superfluous:[
    {group:'🍽️ Svago',       items:['Ristorante','Pizzeria','Bar / Caffè','Cinema','Teatro','Concerti','Viaggi','Hotel','Altro svago']},
    {group:'🥡 Food delivery',items:['Take away','Consegna a domicilio','Altro food delivery']},
    {group:'🛍️ Shopping',    items:['Abbigliamento','Scarpe','Elettronica','Arredamento','Libri','Giocattoli','Altro shopping']},
    {group:'📱 Abbonamenti',  items:['Netflix','Spotify','Amazon Prime','Disney+','Sky','Giornali','Riviste','Altro abbonamenti']},
    {group:'🎯 Hobby',       items:['Sport','Fotografia','Musica','Videogiochi','Giardinaggio','Bricolage','Altro hobby']},
    {group:'📦 Altro',       items:['Altro']},
  ],
  income:[
    {group:'💼 Lavoro',  items:['Stipendio','Bonus','Straordinari','Rimborso spese','Freelance','Pensione','Altro lavoro']},
    {group:'🏡 Rendite', items:['Affitto percepito','Dividendi','Interessi bancari','Vendita immobile','Altro rendite']},
    {group:'🎁 Altro',   items:['Regalo ricevuto','Vendita oggetti','Rimborso assicurazione','Vincita','Altro']},
  ]
};

const ICONS = {
  'Affitto':'🏠','Mutuo':'🏠','Bolletta luce':'💡','Bolletta gas':'🔥','Internet':'📡','Condominio':'🏢','Acqua':'💧','Telefono fisso':'☎️',
  'Carburante':'⛽','Assicurazione auto':'🚗','Rata auto':'🚗','Parcheggio':'🅿️','Bollo':'📋','Manutenzione auto':'🔧',
  'Supermercato':'🛒','Mercato':'🥦','Panetteria':'🍞',
  'Take away':'🥡','Consegna a domicilio':'🛵',
  'Farmacia':'💊','Medico':'🩺','Dentista':'🦷','Ospedale':'🏥','Palestra':'🏋️',
  'Scuola':'📚','Università':'🎓','Asilo':'👶','Babysitter':'👩','Animali domestici':'🐾','Abbigliamento bambini':'👕',
  'Ristorante':'🍽️','Pizzeria':'🍕','Bar / Caffè':'☕','Cinema':'🎬','Teatro':'🎭','Concerti':'🎵','Viaggi':'✈️','Hotel':'🏨',
  'Abbigliamento':'👗','Scarpe':'👟','Elettronica':'📱','Arredamento':'🛋️','Libri':'📖','Giocattoli':'🎮',
  'Netflix':'📺','Spotify':'🎧','Amazon Prime':'📦','Disney+':'🎠','Sky':'📡','Giornali':'📰','Riviste':'📓',
  'Sport':'⚽','Fotografia':'📷','Musica':'🎸','Videogiochi':'🕹️','Giardinaggio':'🌱','Bricolage':'🔨',
  'Stipendio':'💼','Bonus':'🏆','Straordinari':'⏰','Rimborso spese':'🧾','Freelance':'💻','Pensione':'👴',
  'Affitto percepito':'🏡','Dividendi':'📈','Interessi bancari':'🏦','Vendita immobile':'🏘️',
  'Regalo ricevuto':'🎁','Vendita oggetti':'♻️','Rimborso assicurazione':'🛡️','Vincita':'🍀',
};
function icon(n){ return ICONS[n]||'•'; }

let curYear  = new Date().getFullYear();
let curMonth = new Date().getMonth();
let selId    = null;
let data     = {};
let ins      = {type:null,name:'',amount:0};

function saveData(){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){} }
function loadData(){ try{const r=localStorage.getItem(STORAGE_KEY);if(r)data=JSON.parse(r);}catch(e){data={};} }
function fmt(n){ return '€ '+Math.abs(n).toFixed(2).replace('.',','); }
function fmtS(n){ return (n>=0?'+ ':'-')+fmt(n); }
function key(y,m){ return `${y}-${m}`; }

function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(dateStr){
  if(!dateStr||dateStr==='senza-data') return 'Senza data';
  const [y,m,d]=dateStr.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  return `${DAYS_IT[dt.getDay()]} ${d} ${MONTHS[m-1]}`;
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ── MEDIE MENSILI PER CATEGORIA ───────────────────────────────────────────────
// Restituisce la spesa media mensile per una categoria nei mesi passati (escluso mese corrente)
function catMonthlyAvg(cat){
  const ck=key(curYear,curMonth);
  const byM={};
  Object.entries(data).forEach(([k,arr])=>{
    if(k===ck) return;
    arr.filter(e=>e.cat===cat).forEach(e=>{ byM[k]=(byM[k]||0)+e.amount; });
  });
  const vals=Object.values(byM);
  return vals.length ? vals.reduce((s,v)=>s+v,0)/vals.length : null;
}

// Media mensile per singola voce (nome+cat) nei mesi passati
function itemMonthlyAvg(name,cat){
  const ck=key(curYear,curMonth);
  const byM={};
  Object.entries(data).forEach(([k,arr])=>{
    if(k===ck) return;
    arr.filter(e=>e.name===name&&e.cat===cat).forEach(e=>{ byM[k]=(byM[k]||0)+e.amount; });
  });
  const vals=Object.values(byM);
  return vals.length ? vals.reduce((s,v)=>s+v,0)/vals.length : null;
}

function nHistMonths(){
  const ck=key(curYear,curMonth);
  return Object.keys(data).filter(k=>k!==ck&&data[k]&&data[k].length>0).length;
}
function barColor(cur,avg,cat){
  if(avg===null) return cat==='income'?'inc-green':'green';
  const r=cur/(avg||1);
  if(cat==='income') return r>=0.97?'inc-green':r>=0.85?'inc-yellow':'inc-red';
  return r<=1.03?'green':r<=1.15?'yellow':'red';
}
function avgCls(cur,avg,cat){
  if(!avg) return 'avgc-same';
  const d=cur-avg,t=avg*0.03;
  if(Math.abs(d)<t) return 'avgc-same';
  if(cat==='income') return d>0?'avgc-better':'avgc-worse';
  return d>0?'avgc-worse':'avgc-better';
}
function heroCls(cur,avg){
  if(!avg) return 'avg-same';
  const d=cur-avg,t=Math.abs(avg)*0.03;
  if(Math.abs(d)<t) return 'avg-same';
  return d>0?'avg-better':'avg-worse';
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderMain(){
  document.getElementById('month-title').textContent=MONTHS[curMonth]+' '+curYear;
  const entries=(data[key(curYear,curMonth)]||[]).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  const tEss=entries.filter(e=>e.cat==='essential').reduce((s,e)=>s+e.amount,0);
  const tSup=entries.filter(e=>e.cat==='superfluous').reduce((s,e)=>s+e.amount,0);
  const tInc=entries.filter(e=>e.cat==='income').reduce((s,e)=>s+e.amount,0);
  const tOut=tEss+tSup, bal=tInc-tOut, ref=tInc||1;
  const nHist=nHistMonths();

  // Hero
  const heroEl=document.getElementById('hero-bal');
  heroEl.textContent=(bal>=0?'':'- ')+fmt(bal);
  heroEl.className='hero-val'+(bal<0?' neg':'');

  const avgInc=catMonthlyAvg('income');
  const avgEss=catMonthlyAvg('essential');
  const avgSup=catMonthlyAvg('superfluous');
  const avgOut=(avgEss!==null&&avgSup!==null)?avgEss+avgSup:null;
  const avgBal=(avgInc!==null&&avgOut!==null)?avgInc-avgOut:null;

  const hAvg=document.getElementById('hero-avg');
  if(nHist>=1&&avgBal!==null){
    const d=bal-avgBal,s=d>=0?'+':'-';
    hAvg.textContent=`med. mensile ${fmt(avgBal)} (${s}${fmt(Math.abs(d))})`;
    hAvg.className='hero-avg '+heroCls(bal,avgBal);
  } else hAvg.textContent='';

  // Barra entrate = 100%
  document.getElementById('b-in').textContent=fmt(tInc);
  document.getElementById('bf-inc').style.width='100%';
  const bavgIn=document.getElementById('bavg-in');
  if(nHist>=1&&avgInc!==null){
    const d=tInc-avgInc,s=d>=0?'+':'-';
    bavgIn.textContent=`med. mensile entrate ${fmt(avgInc)} (${s}${fmt(Math.abs(d))})`;
    bavgIn.className='bar-avg '+avgCls(tInc,avgInc,'income');
  } else bavgIn.textContent='';

  // Barra uscite bipartita
  const outPct=Math.min(100,Math.round(tOut/ref*100));
  const essPct=tOut>0?Math.round(tEss/tOut*outPct):0;
  document.getElementById('b-out').textContent=fmt(tOut);
  document.getElementById('bf-ess').style.width=essPct+'%';
  document.getElementById('bf-sup').style.width=(outPct-essPct)+'%';
  document.getElementById('b-ess-lbl').textContent=`Essenziali ${fmt(tEss)}`;
  document.getElementById('b-sup-lbl').textContent=`Superflue ${fmt(tSup)}`;
  const bavgOut=document.getElementById('bavg-out');
  if(nHist>=1&&avgOut!==null){
    const d=tOut-avgOut,s=d>=0?'+':'-';
    bavgOut.textContent=`med. mensile uscite ${fmt(avgOut)} (${s}${fmt(Math.abs(d))}) — ess. ${fmt(avgEss||0)} / sup. ${fmt(avgSup||0)}`;
    bavgOut.className='bar-avg '+avgCls(tOut,avgOut,'expense');
  } else bavgOut.textContent='';

  // Lista per data decrescente
  const lw=document.getElementById('list-wrap');
  if(!entries.length){lw.innerHTML='<div class="list-empty">Nessuna voce<br>premi + per aggiungere</div>';return;}

  const groups={};
  entries.forEach(e=>{ const gk=e.date||'senza-data'; if(!groups[gk])groups[gk]=[]; groups[gk].push(e); });
  const sortedKeys=Object.keys(groups).sort((a,b)=>b.localeCompare(a));

  lw.innerHTML=sortedKeys.map(dk=>{
    const label=fmtDate(dk);
    return `<div class="date-group">
      <div class="date-hdr">${label}</div>
      ${groups[dk].map(e=>{
        const cls=e.cat;
        const sub={essential:'Essenziale',superfluous:'Superflua',income:'Entrata'}[e.cat];
        const sel=selId===e._id?' selected':'';
        const ha=itemMonthlyAvg(e.name,e.cat);
        let prog='';
        if(nHist>=1&&ha!==null&&ha>0){
          const pct=Math.min(100,Math.round(e.amount/ha*100));
          const col=barColor(e.amount,ha,e.cat);
          const diff=e.amount-ha,ds=diff>=0?'+':'-';
          prog=`<div class="prog-wrap">
            <div class="prog-meta">
              <span class="prog-cur">${pct}% della media mensile</span>
              <span class="prog-avg-lbl">med. ${fmt(ha)} <span style="color:${diff>0?(e.cat==='income'?'#3a9a20':'#c83030'):'#3a9a20'}">${ds}${fmt(Math.abs(diff))}</span></span>
            </div>
            <div class="prog-track"><div class="prog-fill ${col}" style="width:${pct}%"></div></div>
          </div>`;
        }
        return `<div class="item ${cls}${sel}" onclick="selItem('${e._id}')">
          <div class="item-icon">${icon(e.name)}</div>
          <div class="item-body">
            <div class="item-name">${e.name}</div>
            <div class="item-sub">${sub}</div>
            ${prog}
          </div>
          <div class="item-amt">${fmt(e.amount)}</div>
          <button class="item-del" onclick="delItem(event,'${e._id}')">✕</button>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function selItem(id){ selId=(selId===id?null:id); renderMain(); }
function delItem(ev,id){
  ev.stopPropagation();
  const k=key(curYear,curMonth);
  if(data[k]) data[k]=data[k].filter(e=>e._id!==id);
  saveData(); selId=null; renderMain(); showToast('Voce eliminata');
}
function changeMonth(d){
  curMonth+=d;
  if(curMonth<0){curMonth=11;curYear--;}
  if(curMonth>11){curMonth=0;curYear++;}
  selId=null; renderMain();
}

function showInsert(){
  ins={type:null,name:'',amount:0};
  const today=new Date();
  document.getElementById('ins-date-lbl').textContent=`${DAYS_IT[today.getDay()]} ${today.getDate()} ${MONTHS[today.getMonth()]}`;
  document.getElementById('insert-screen').classList.add('open');
  ['ess','sup','inc'].forEach(id=>document.getElementById('t-'+id).classList.remove('sel'));
  document.getElementById('cat-card').style.display='none';
  document.getElementById('f-name').value='';
  document.getElementById('preview').classList.remove('vis');
  document.getElementById('ins-save').disabled=true;
  renderAmt();
}
function showMain(){ document.getElementById('insert-screen').classList.remove('open'); }

function setType(t){
  ins.type=t; ins.name='';
  document.getElementById('f-name').value='';
  ['ess','sup','inc'].forEach(id=>document.getElementById('t-'+id).classList.remove('sel'));
  document.getElementById('t-'+{essential:'ess',superfluous:'sup',income:'inc'}[t]).classList.add('sel');
  document.getElementById('cat-card').style.display='block';
  renderCats(); updatePreview(); checkSave();
}
function renderCats(){
  document.getElementById('cat-section').innerHTML=CATS[ins.type].map(g=>
    `<div class="cat-group-lbl">${g.group}</div>
     <div class="cat-items">${g.items.map(n=>
       `<div class="cat-chip${ins.name===n?' sel':''}" onclick="setName('${n.replace(/'/g,"\\'")}')">${n}</div>`
     ).join('')}</div>`
  ).join('');
}
function setName(n){ ins.name=n; document.getElementById('f-name').value=n; renderCats(); updatePreview(); checkSave(); }
function onNameInput(){ ins.name=document.getElementById('f-name').value.trim(); renderCats(); updatePreview(); checkSave(); }
function addAmt(v){ ins.amount=Math.round((ins.amount+v)*100)/100; renderAmt(); }
function clearAmt(){ ins.amount=0; renderAmt(); }
function renderAmt(){
  const d=document.getElementById('amt-disp');
  d.textContent='€ '+ins.amount.toFixed(2).replace('.',',');
  d.className='amt-val'+(ins.amount>0?' has':'');
  updatePreview(); checkSave();
}
function updatePreview(){
  const el=document.getElementById('preview');
  if(!ins.type||!ins.name||ins.amount<=0){el.classList.remove('vis');return;}
  el.classList.add('vis');
  document.getElementById('prev-name').textContent=ins.name+' — €'+ins.amount.toFixed(2).replace('.',',');
  document.getElementById('prev-detail').textContent={essential:'Uscita essenziale',superfluous:'Uscita superflua',income:'Entrata'}[ins.type];
}
function checkSave(){
  document.getElementById('ins-save').disabled=!(ins.type&&ins.name&&ins.amount>0);
}
function doSave(){
  const k=key(curYear,curMonth);
  if(!data[k]) data[k]=[];
  data[k].push({_id:Date.now().toString(),_ts:Date.now(),date:todayStr(),name:ins.name,amount:ins.amount,cat:ins.type});
  saveData(); showMain(); renderMain(); showToast('Voce aggiunta ✓');
}

loadData();
renderMain();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
